name: Publish npm

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: Stable semver version to publish on the latest dist-tag, for example 0.1.1.
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'MeetQuinn/anima' && (github.event_name != 'push' || vars.NPM_CANARY_PUBLISH_ENABLED == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile

      - name: Select version and dist-tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            DIST_TAG="latest"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Stable version must be a simple semver, for example 0.1.3" >&2
              exit 1
            fi
            if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
              echo "Git tag v$VERSION already exists" >&2
              exit 1
            fi
          else
            LATEST_STABLE="$(npm view @meetquinn/animactl@latest version 2>/dev/null || true)"
            export LATEST_STABLE
            VERSION="$(node <<'NODE'
          const fs = require('node:fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const baseVersion = process.env.LATEST_STABLE || pkg.version;
          const [major, minor, patch] = baseVersion.split('-')[0].split('.').map(Number);
          if (![major, minor, patch].every(Number.isInteger)) {
            throw new Error(`canary base version is not a simple semver: ${baseVersion}`);
          }
          const run = process.env.GITHUB_RUN_NUMBER;
          const attempt = process.env.GITHUB_RUN_ATTEMPT;
          const sha = process.env.GITHUB_SHA.slice(0, 7);
          process.stdout.write(`${major}.${minor}.${patch + 1}-canary.${run}.${attempt}.${sha}`);
          NODE
            )"
            DIST_TAG="canary"
          fi
          VERSION="$VERSION" node -e "const fs=require('node:fs'); const path='packages/animactl/package.json'; const pkg=JSON.parse(fs.readFileSync(path,'utf8')); pkg.version=process.env.VERSION; fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');"
          if npm view "@meetquinn/animactl@$VERSION" version >/dev/null 2>&1; then
            echo "@meetquinn/animactl@$VERSION already exists on npm" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing @meetquinn/animactl@$VERSION with dist-tag $DIST_TAG"

      - run: pnpm build
      - run: pnpm test:fast:dist
      - run: pnpm animactl:package-smoke
      - name: Prepare release installer
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          VERSION="${{ steps.release.outputs.version }}"
          sed "s/^ANIMA_VERSION_DEFAULT=.*/ANIMA_VERSION_DEFAULT=\"$VERSION\"/" scripts/install.sh > release-assets/install.sh
          chmod +x release-assets/install.sh
          sh -n release-assets/install.sh
          cat > release-assets/notes.md <<EOF
          Stable npm release for \`@meetquinn/animactl@$VERSION\`.

          Install:

          \`\`\`sh
          curl -fsSL https://anima.meetquinn.ai/install.sh | sh
          \`\`\`
          EOF
      - run: npm publish --access public --tag "${{ steps.release.outputs.dist_tag }}"
        working-directory: packages/animactl
      - name: Create GitHub release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.release.outputs.version }}"
          TAG="v$VERSION"
          gh release create "$TAG" release-assets/install.sh \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Anima $VERSION" \
            --notes-file release-assets/notes.md
